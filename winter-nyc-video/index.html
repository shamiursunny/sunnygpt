<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Winter Day in New York City</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0a0f1a;
      color: #e8eef5;
      font-family: 'Georgia', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .snowflakes {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .snowflake {
      position: absolute;
      top: -20px;
      color: #b8d4e8;
      font-size: 1em;
      animation: fall linear infinite;
      opacity: 0.6;
      user-select: none;
    }

    @keyframes fall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 0.6; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0.1; }
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 960px;
      width: 100%;
      text-align: center;
    }

    .title-block {
      margin-bottom: 28px;
    }

    .eyebrow {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #6fa8c8;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: normal;
      color: #ddeaf5;
      line-height: 1.2;
      text-shadow: 0 0 40px rgba(120, 180, 220, 0.3);
    }

    .subtitle {
      margin-top: 10px;
      font-size: 0.95rem;
      color: #7a9db5;
      font-style: italic;
    }

    .video-wrapper {
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(80, 150, 200, 0.15), 0 20px 60px rgba(0,0,0,0.6);
      border: 1px solid rgba(100, 160, 200, 0.15);
      background: #000;
    }

    video {
      width: 100%;
      display: block;
      border-radius: 14px;
    }

    .footer {
      margin-top: 20px;
      font-size: 0.78rem;
      color: #3f5d72;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <!-- Snowflake layer -->
  <div class="snowflakes" id="snowflakes"></div>

  <div class="container">
    <div class="title-block">
      <p class="eyebrow">AI Generated · Veo 3.1</p>
      <h1>Winter Day in New York City</h1>
      <p class="subtitle">Central Park — A quiet snowfall over the city that never sleeps</p>
    </div>

    <div class="video-wrapper">
      <video
        src="https://storage.googleapis.com/orchids-video-uploads/veo-outputs/317c3299-49ef-494c-8076-e2bffeec1a41/a-cinematic-wide-shot-of-a-winter-day-in-new-yor-923083e8/8848765648385233098/sample_0.mp4"
        controls
        autoplay
        loop
        muted
        playsinline
      ></video>
    </div>

    <p class="footer">Generated with Veo 3.1 Fast · 1080p · 24fps · Native Audio</p>
  </div>

  <script>
    // Generate drifting snowflakes
    const container = document.getElementById('snowflakes');
    const count = 60;
    const symbols = ['❄', '❅', '❆', '·', '•'];

    for (let i = 0; i < count; i++) {
      const flake = document.createElement('span');
      flake.classList.add('snowflake');
      flake.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      flake.style.left = Math.random() * 100 + 'vw';
      flake.style.fontSize = (0.5 + Math.random() * 1.2) + 'rem';
      flake.style.animationDuration = (5 + Math.random() * 12) + 's';
      flake.style.animationDelay = (Math.random() * 10) + 's';
      flake.style.opacity = 0.2 + Math.random() * 0.5;
      container.appendChild(flake);
    }

    // Unmute on first interaction (autoplay policy workaround)
    const video = document.querySelector('video');
    document.addEventListener('click', () => {
      if (video.muted) {
        video.muted = false;
      }
    }, { once: true });
  </script>
</body>
</html>
